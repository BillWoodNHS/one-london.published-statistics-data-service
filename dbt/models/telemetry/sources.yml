version: 2

sources:
  - name: ingest
    description: |
      INGEST schema tables that receive Snowpipe loads directly.
      These tables preserve the full audit trail including re-uploads/duplicates.
    database: "{{ target.database }}"
    schema: "{{ var('ingest_schema') }}"
    tables:
      - name: INGEST_FUNCTION_APP_EVENTS
