[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

[tool.ruff]
line-length = 88
target-version = "py311"
exclude = [
	".venv",
	".git",
	"__pycache__",
	".mypy_cache",
	".pytest_cache",
	"dbt/target",
	"dbt/dbt_packages",
	"dbt/logs",
]

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = ["E203"]
