dataset_id: monthly-diagnostic-waiting-times-and-activity
series_id: monthly-diagnostic-waiting-times-and-activity
entry_url: https://www.england.nhs.uk/statistics/statistical-work-areas/diagnostics-waiting-times-and-activity/monthly-diagnostics-waiting-times-and-activity/
publication_date:
  source: link_text
  pattern: (?:published|publication\s*date|last\s*updated)\s*:?\s*(\d{1,2}\s+[A-Za-z]{3,9}\s+\d{4}|\d{4}-\d{2}-\d{2})
subject_period:
  rules:
  - source: file_name
    pattern: (jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:t(?:ember)?)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)(?:[\s_\-/]*\d{2,4})
  - source: url_segment
    pattern: (jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:t(?:ember)?)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)(?:[\s_\-/]*\d{2,4})
  - source: page_text
    pattern: (jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:t(?:ember)?)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)(?:[\s_\-/]*\d{2,4})
fallback:
  allow_manual_acquisition: true
  manual_drop_path: manual/monthly-diagnostic-waiting-times-and-activity
  max_auto_retries: 3
  timeout_threshold_minutes: 5
targets:
- sub_dataset_id: default
  object_name_suffix: DIAGNOSTIC_WAIT_DEFAULT
  adls_path_prefix: monthly-diagnostic-waiting-times-and-activity/default
  source_pages:
  - page_url: https://www.england.nhs.uk/statistics/statistical-work-areas/diagnostics-waiting-times-and-activity/monthly-diagnostics-waiting-times-and-activity/monthly-diagnostics-data-2025-26/
    page_role: subject_period_index
    partitioning_strategy: subject_period
    scrape_steps:
    - link_selector: a[href*='DM01'][href$='.zip']
      text_filter: CSV Extract
      file_extensions: &id001
      - zip
    sibling_discovery:
      enabled: true
      link_selector: a[href]
      url_pattern: null
      text_pattern: null
      max_pages: 25
  - page_url: https://www.england.nhs.uk/statistics/statistical-work-areas/diagnostics-waiting-times-and-activity/monthly-diagnostics-waiting-times-and-activity/monthly-diagnostics-data-2024-25/
    page_role: subject_period_index
    partitioning_strategy: subject_period
    scrape_steps:
    - link_selector: a[href*='DM01'][href$='.zip']
      text_filter: CSV Extract
      file_extensions: *id001
    sibling_discovery:
      enabled: true
      link_selector: a[href]
      url_pattern: null
      text_pattern: null
      max_pages: 25
  - page_url: https://www.england.nhs.uk/statistics/statistical-work-areas/diagnostics-waiting-times-and-activity/monthly-diagnostics-waiting-times-and-activity/monthly-diagnostics-data-2012-13/
    page_role: subject_period_index
    partitioning_strategy: subject_period
    scrape_steps:
    - link_selector: a[href*='DM01'][href$='.zip']
      text_filter: CSV Extract
      file_extensions: *id001
    sibling_discovery:
      enabled: true
      link_selector: a[href]
      url_pattern: null
      text_pattern: null
      max_pages: 25
  reporting_period_columns: []
  period_coverage:
    file_scope:
      duration_type: unknown
      duration_value: null
      duration_unit: null
      fiscal_year_start_month: 4
    breakdown_granularity:
    - month

  page_date_selectors:
  - (?:published|publication\s*date|last\s*updated)\s*:?\s*(\d{1,2}\s+[A-Za-z]{3,9}\s+\d{4})
  - (?:published|publication\s*date|last\s*updated)\s*:?\s*(\d{4}-\d{2}-\d{2})
