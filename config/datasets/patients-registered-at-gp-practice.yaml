dataset_id: patients-registered-at-gp-practice
series_id: patients-registered-at-gp-practice
entry_url: https://digital.nhs.uk/data-and-information/publications/statistical/patients-registered-at-a-gp-practice
publication_date:
  source: link_text
  pattern: (?:published|publication\s*date|last\s*updated)\s*:?\s*(\d{1,2}\s+[A-Za-z]{3,9}\s+\d{4}|\d{4}-\d{2}-\d{2})
subject_period:
  rules:
  - source: file_name
    pattern: (jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:t(?:ember)?)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)(?:[\s_\-/]*\d{2,4})
  - source: url_segment
    pattern: (jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:t(?:ember)?)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)(?:[\s_\-/]*\d{2,4})
  - source: page_text
    pattern: (jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:t(?:ember)?)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)(?:[\s_\-/]*\d{2,4})
fallback:
  allow_manual_acquisition: true
  manual_drop_path: manual/patients-registered-at-gp-practice
  max_auto_retries: 3
  timeout_threshold_minutes: 5
targets:
- sub_dataset_id: five-year-age-groups-regions
  source_pages:
  - page_url: https://digital.nhs.uk/data-and-information/publications/statistical/patients-registered-at-a-gp-practice
    page_role: default
    partitioning_strategy: subject_period
    scrape_steps:
    - link_selector: a[href*='gp-reg-pat-prac-quin-age' i]
      file_extensions:
      - csv
      - zip
    sibling_discovery:
      enabled: true
      link_selector: a[href]
      url_pattern: null
      text_pattern: null
      max_pages: 200
  reporting_period_columns: []
  page_date_selectors: &id001
  - (?:published|publication\s*date|last\s*updated)\s*:?\s*(\d{1,2}\s+[A-Za-z]{3,9}\s+\d{4})
  - (?:published|publication\s*date|last\s*updated)\s*:?\s*(\d{4}-\d{2}-\d{2})
- sub_dataset_id: gp-practice-all-persons
  source_pages:
  - page_url: https://digital.nhs.uk/data-and-information/publications/statistical/patients-registered-at-a-gp-practice
