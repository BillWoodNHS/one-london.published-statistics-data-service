dataset_id: cancer-waiting-times
series_id: cancer-waiting-times
entry_url: https://www.england.nhs.uk/statistics/statistical-work-areas/cancer-waiting-times/
publication_date:
  source: link_text
  pattern: (?:published|publication\s*date|last\s*updated)\s*:?\s*(\d{1,2}\s+[A-Za-z]{3,9}\s+\d{4}|\d{4}-\d{2}-\d{2})
subject_period:
  rules:
  - source: file_name
    pattern: (jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:t(?:ember)?)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)(?:[\s_\-/]*\d{2,4})
  - source: url_segment
    pattern: (jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:t(?:ember)?)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)(?:[\s_\-/]*\d{2,4})
  - source: page_text
    pattern: (jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:t(?:ember)?)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)(?:[\s_\-/]*\d{2,4})
fallback:
  allow_manual_acquisition: true
  manual_drop_path: manual/cancer-waiting-times
  max_auto_retries: 3
  timeout_threshold_minutes: 5
targets:
- sub_dataset_id: combined-provider-commissioner
  object_name_suffix: CANCER_WAIT_COMBINED
  adls_path_prefix: cancer-waiting-times/combined-provider-commissioner
  source_pages:
  - page_url: https://www.england.nhs.uk/statistics/statistical-work-areas/cancer-waiting-times/
    page_role: default
    partitioning_strategy: none
    scrape_steps:
    - link_selector: a[href*='Apr-Mar']
      text_filter: Apr.*Mar|Combined|Final
      file_extensions:
      - csv
      - xlsx
    sibling_discovery:
      enabled: false
      link_selector: a[href]
      url_pattern: null
      text_pattern: null
      max_pages: 25
  reporting_period_columns: []
  page_date_selectors: &id001
  - (?:published|publication\s*date|last\s*updated)\s*:?\s*(\d{1,2}\s+[A-Za-z]{3,9}\s+\d{4})
  - (?:published|publication\s*date|last\s*updated)\s*:?\s*(\d{4}-\d{2}-\d{2})
- sub_dataset_id: commissioner-based
  object_name_suffix: CANCER_WAIT_COMMISSIONER
  adls_path_prefix: cancer-waiting-times/commissioner-based
  source_pages:
  - page_url: https://www.england.nhs.uk/statistics/statistical-work-areas/cancer-waiting-times/
    page_role: default
    partitioning_strategy: none
    scrape_steps:
    - link_selector: a[href*='ICB']
      text_filter: ICB|Commissioner|Extract
      file_extensions:
      - xlsx
    sibling_discovery:
      enabled: false
      link_selector: a[href]
      url_pattern: null
      text_pattern: null
      max_pages: 25
  reporting_period_columns: []
  page_date_selectors: *id001
- sub_dataset_id: monthly-cancer-waiting-times-statistics
  object_name_suffix: CANCER_WAIT_MONTHLY
  adls_path_prefix: cancer-waiting-times/monthly-cancer-waiting-times-statistics
  source_pages:
  - page_url: https://www.england.nhs.uk/statistics/2025-26-monthly-cancer-waiting-times-statistics/
    page_role: archive
    partitioning_strategy: none
    scrape_steps:
    - link_selector: a[href*='Monthly-Combined-CSV']
      text_filter: Monthly|Combined|CSV|Provisional
      file_extensions:
      - csv
    sibling_discovery:
      enabled: false
      link_selector: a[href]
      url_pattern: null
      text_pattern: null
      max_pages: 25
  reporting_period_columns: []
  page_date_selectors: *id001
- sub_dataset_id: provider-based
  object_name_suffix: CANCER_WAIT_PROVIDER
  adls_path_prefix: cancer-waiting-times/provider-based
  source_pages:
  - page_url: https://www.england.nhs.uk/statistics/statistical-work-areas/cancer-waiting-times/
    page_role: default
    partitioning_strategy: none
    scrape_steps:
    - link_selector: a[href*='Data-Extract-Provider']
      text_filter: Provider|Extract
      file_extensions:
      - xlsx
    sibling_discovery:
      enabled: false
      link_selector: a[href]
      url_pattern: null
      text_pattern: null
      max_pages: 25
  reporting_period_columns: []
  page_date_selectors: *id001
