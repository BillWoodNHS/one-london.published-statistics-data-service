dataset_id: data-quality-maturity-index
series_id: data-quality-maturity-index
entry_url: https://digital.nhs.uk/data-and-information/data-tools-and-services/data-services/data-quality
publication_date:
  source: link_text
  pattern: (?:published|publication\s*date|last\s*updated)\s*:?\s*(\d{1,2}\s+[A-Za-z]{3,9}\s+\d{4}|\d{4}-\d{2}-\d{2})
subject_period:
  rules:
  - source: file_name
    pattern: (jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:t(?:ember)?)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)(?:[\s_\-/]*\d{2,4})
  - source: url_segment
    pattern: (jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:t(?:ember)?)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)(?:[\s_\-/]*\d{2,4})
  - source: page_text
    pattern: (jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:t(?:ember)?)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)(?:[\s_\-/]*\d{2,4})
fallback:
  allow_manual_acquisition: true
  manual_drop_path: manual/data-quality-maturity-index
  max_auto_retries: 3
  timeout_threshold_minutes: 5
targets:
- sub_dataset_id: with-did
  object_name_suffix: DQMI_WITH_DID
  adls_path_prefix: data-quality-maturity-index/with-did
  source_pages:
  - page_url: https://digital.nhs.uk/data-and-information/data-tools-and-services/data-services/data-quality
    page_role: default
    partitioning_strategy: none
    scrape_steps:
    - link_selector: a[href*='did'], a[href*='DID']
      text_filter: DQMI.*CSV.*DID
      file_extensions: &id001
      - csv
    sibling_discovery:
      enabled: false
      link_selector: a[href]
      url_pattern: null
      text_pattern: null
      max_pages: 25
  - page_url: https://digital.nhs.uk/data-and-information/data-tools-and-services/data-services/data-quality/archive
    page_role: archive
    partitioning_strategy: subject_period
    scrape_steps:
    - link_selector: a[href*='did'], a[href*='DID']
      text_filter: DQMI.*CSV.*DID
      file_extensions: *id001
    sibling_discovery:
      enabled: false
      link_selector: a[href]
      url_pattern: null
      text_pattern: null
      max_pages: 25
  reporting_period_columns: []
  period_coverage:
    file_scope:
      duration_type: unknown
      duration_value: null
      duration_unit: null
      fiscal_year_start_month: 4
    breakdown_granularity:
    - month

  page_date_selectors: &id002
  - (?:published|publication\s*date|last\s*updated)\s*:?\s*(\d{1,2}\s+[A-Za-z]{3,9}\s+\d{4})
  - (?:published|publication\s*date|last\s*updated)\s*:?\s*(\d{4}-\d{2}-\d{2})
- sub_dataset_id: without-did
  object_name_suffix: DQMI_WITHOUT_DID
  adls_path_prefix: data-quality-maturity-index/without-did
  source_pages:
  - page_url: https://digital.nhs.uk/data-and-information/data-tools-and-services/data-services/data-quality
    page_role: default
    partitioning_strategy: none
    scrape_steps:
    - link_selector: a[href$='.csv']
      text_filter: ^(?!.*DID included)(?!.*\bdid\b).*DQMI.*CSV
      file_extensions:
      - csv
    sibling_discovery:
      enabled: false
      link_selector: a[href]
      url_pattern: null
      text_pattern: null
      max_pages: 25
  reporting_period_columns: []
  period_coverage:
    file_scope:
      duration_type: unknown
      duration_value: null
      duration_unit: null
      fiscal_year_start_month: 4
    breakdown_granularity:
    - month

  page_date_selectors: *id002
