dataset_id: mental_health_services_monthly_statistics
series_id: mental_health_services_monthly_statistics
entry_url: https://digital.nhs.uk/data-and-information/publications/statistical/mental-health-services-monthly-statistics
publication_date:
  source: link_text
  pattern: (?:published|publication\s*date|last\s*updated)\s*:?\s*(\d{1,2}\s+[A-Za-z]{3,9}\s+\d{4}|\d{4}-\d{2}-\d{2})
subject_period:
  rules:
  - source: file_name
    pattern: (jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:t(?:ember)?)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)(?:[\s_\-/]*\d{2,4})
  - source: url_segment
    pattern: (jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:t(?:ember)?)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)(?:[\s_\-/]*\d{2,4})
  - source: page_text
    pattern: (jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:t(?:ember)?)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)(?:[\s_\-/]*\d{2,4})
fallback:
  allow_manual_acquisition: true
  manual_drop_path: manual/mental_health_services_monthly_statistics
  max_auto_retries: 3
  timeout_threshold_minutes: 5
targets:
- sub_dataset_id: out-of-area-placements
  object_name_suffix: MH_SERVICES_OOA
  adls_path_prefix: mental_health_services_monthly_statistics/out-of-area-placements
  source_pages:
  - page_url: https://digital.nhs.uk/data-and-information/publications/statistical/mental-health-services-monthly-statistics/performance-march-2026
    page_role: default
    partitioning_strategy: subject_period
    scrape_steps:
    - link_selector: a[href$='.zip']
      text_filter: Out of Area Placements
      file_extensions:
      - zip
    sibling_discovery:
      enabled: true
      link_selector: a[href]
      url_pattern: null
      text_pattern: null
      max_pages: 25
  reporting_period_columns: []
  page_date_selectors: &id001
  - (?:published|publication\s*date|last\s*updated)\s*:?\s*(\d{1,2}\s+[A-Za-z]{3,9}\s+\d{4})
  - (?:published|publication\s*date|last\s*updated)\s*:?\s*(\d{4}-\d{2}-\d{2})
- sub_dataset_id: performance-data-file
  object_name_suffix: MH_SERVICES_PERFORMANCE
  adls_path_prefix: mental_health_services_monthly_statistics/performance-data-file
  source_pages:
  - page_url: https://digital.nhs.uk/data-and-information/publications/statistical/mental-health-services-monthly-statistics/performance-march-2026
    page_role: default
    partitioning_strategy: subject_period
    scrape_steps:
    - link_selector: a[href$='.zip']
      text_filter: 'MHSDS Monthly: Performance .* Data File'
      file_extensions:
      - zip
    sibling_discovery:
      enabled: true
      link_selector: a[href]
      url_pattern: null
      text_pattern: null
      max_pages: 25
  reporting_period_columns: []
  page_date_selectors: *id001
- sub_dataset_id: restrictive-interventions
  object_name_suffix: MH_SERVICES_RESTRICTIVE
  adls_path_prefix: mental_health_services_monthly_statistics/restrictive-interventions
  source_pages:
  - page_url: https://digital.nhs.uk/data-and-information/publications/statistical/mental-health-services-monthly-statistics/performance-march-2026
    page_role: default
    partitioning_strategy: subject_period
    scrape_steps:
    - link_selector: a[href$='.zip']
      text_filter: Restrictive Interventions
      file_extensions:
      - zip
    sibling_discovery:
      enabled: true
      link_selector: a[href]
      url_pattern: null
      text_pattern: null
      max_pages: 25
  reporting_period_columns: []
  page_date_selectors: *id001
