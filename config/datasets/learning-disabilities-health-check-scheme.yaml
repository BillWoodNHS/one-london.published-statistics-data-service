dataset_id: learning-disabilities-health-check-scheme
series_id: learning-disabilities-health-check-scheme
entry_url: https://digital.nhs.uk/data-and-information/publications/statistical/learning-disabilities-health-check-scheme
publication_date:
  source: link_text
  pattern: (?:published|publication\s*date|last\s*updated)\s*:?\s*(\d{1,2}\s+[A-Za-z]{3,9}\s+\d{4}|\d{4}-\d{2}-\d{2})
subject_period:
  rules:
  - source: file_name
    pattern: (jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:t(?:ember)?)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)(?:[\s_\-/]*\d{2,4})
  - source: url_segment
    pattern: (jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:t(?:ember)?)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)(?:[\s_\-/]*\d{2,4})
  - source: page_text
    pattern: (jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:t(?:ember)?)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)(?:[\s_\-/]*\d{2,4})
fallback:
  allow_manual_acquisition: true
  manual_drop_path: manual/learning-disabilities-health-check-scheme
  max_auto_retries: 3
  timeout_threshold_minutes: 5
targets:
- sub_dataset_id: monthly-publication
  object_name_suffix: LD_HEALTH_MONTHLY
  adls_path_prefix: learning-disabilities-health-check-scheme/monthly-publication
  source_pages:
  - page_url: https://digital.nhs.uk/data-and-information/publications/statistical/learning-disabilities-health-check-scheme/england-march-2026
    page_role: archive
    partitioning_strategy: subject_period
    scrape_steps:
    - link_selector: a[href$='.csv']
      text_filter: Learning.Disabilit
      file_extensions:
      - csv
    sibling_discovery:
      enabled: true
      link_selector: a[href]
      url_pattern: null
      text_pattern: null
      max_pages: 25
  reporting_period_columns: []
  period_coverage:
    file_scope:
      duration_type: unknown
      duration_value: null
      duration_unit: null
      fiscal_year_start_month: 4
    breakdown_granularity:
    - month

  page_date_selectors:
  - (?:published|publication\s*date|last\s*updated)\s*:?\s*(\d{1,2}\s+[A-Za-z]{3,9}\s+\d{4})
  - (?:published|publication\s*date|last\s*updated)\s*:?\s*(\d{4}-\d{2}-\d{2})
