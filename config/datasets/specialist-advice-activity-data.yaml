dataset_id: specialist-advice-activity-data
series_id: specialist-advice-activity-data
entry_url: https://www.england.nhs.uk/statistics/statistical-work-areas/outpatient-transformation/specialist-advice/
publication_date:
  source: link_text
  pattern: (?:published|publication\s*date|last\s*updated)\s*:?\s*(\d{1,2}\s+[A-Za-z]{3,9}\s+\d{4}|\d{4}-\d{2}-\d{2})
subject_period:
  rules:
  - source: file_name
    pattern: (jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:t(?:ember)?)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)(?:[\s_\-/]*\d{2,4})
  - source: url_segment
    pattern: (jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:t(?:ember)?)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)(?:[\s_\-/]*\d{2,4})
  - source: page_text
    pattern: (jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:t(?:ember)?)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)(?:[\s_\-/]*\d{2,4})
fallback:
  allow_manual_acquisition: true
  manual_drop_path: manual/specialist-advice-activity-data
  max_auto_retries: 3
  timeout_threshold_minutes: 5
targets:
- sub_dataset_id: commissioner-specialist-advice-activity
  source_pages:
  - page_url: https://www.england.nhs.uk/statistics/statistical-work-areas/outpatient-transformation/specialist-advice/
    page_role: default
    partitioning_strategy: none
    scrape_steps:
    - link_selector: a[href*='ICB-specialist'][href$='.csv']
      text_filter: ICB specialist advi[cs]e activity full dataset
      file_extensions:
      - csv
    sibling_discovery:
      enabled: false
      link_selector: a[href]
      url_pattern: null
      text_pattern: null
      max_pages: 200
  reporting_period_columns: []
  page_date_selectors: &id001
  - (?:published|publication\s*date|last\s*updated)\s*:?\s*(\d{1,2}\s+[A-Za-z]{3,9}\s+\d{4})
  - (?:published|publication\s*date|last\s*updated)\s*:?\s*(\d{4}-\d{2}-\d{2})
- sub_dataset_id: provider-specialist-advice-activity
  source_pages:
  - page_url: https://www.england.nhs.uk/statistics/statistical-work-areas/outpatient-transformation/specialist-advice/
    page_role: default
    partitioning_strategy: none
    scrape_steps:
    - link_selector: a[href*='Provider-specialist'][href$='.csv']
      text_filter: Provider specialist advi[cs]e activity full dataset
      file_extensions:
      - csv
    sibling_discovery:
      enabled: false
      link_selector: a[href]
      url_pattern: null
      text_pattern: null
      max_pages: 200
  reporting_period_columns: []
  page_date_selectors: *id001
