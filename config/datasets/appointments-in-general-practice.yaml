dataset_id: appointments-in-general-practice
series_id: appointments-in-general-practice
entry_url: https://digital.nhs.uk/data-and-information/publications/statistical/appointments-in-general-practice
publication_date:
  source: link_text
  pattern: (?:published|publication\s*date|last\s*updated)\s*:?\s*(\d{1,2}\s+[A-Za-z]{3,9}\s+\d{4}|\d{4}-\d{2}-\d{2})
subject_period:
  rules:
  - source: file_name
    pattern: (jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:t(?:ember)?)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)(\d{2,4})
  - source: url_segment
    pattern: (jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:t(?:ember)?)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)(\d{2,4})
  - source: page_text
    pattern: (jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:t(?:ember)?)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)(\d{2,4})
fallback:
  allow_manual_acquisition: true
  manual_drop_path: manual/appointments-in-general-practice
  max_auto_retries: 3
  timeout_threshold_minutes: 5
targets:
- sub_dataset_id: actual-duration
  source_pages:
  - page_url: https://digital.nhs.uk/data-and-information/publications/statistical/appointments-in-general-practice/march-2026
    page_role: archive
    partitioning_strategy: subject_period
    scrape_steps:
    - link_selector: a[href*='appointments-in-general-practice']
      text_filter: (jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)
      file_extensions: &id001
      - zip
    sibling_discovery:
      enabled: true
      link_selector: a[href]
      url_pattern: null
      text_pattern: null
      max_pages: 25
  - page_url: https://digital.nhs.uk/data-and-information/publications/statistical/appointments-in-general-practice/february-2026
    page_role: archive
    partitioning_strategy: subject_period
    scrape_steps:
    - link_selector: a[href*='appointments-in-general-practice']
      text_filter: (jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)
      file_extensions: *id001
    sibling_discovery:
      enabled: true
      link_selector: a[href]
      url_pattern: null
      text_pattern: null
      max_pages: 25
  reporting_period_columns: []
  page_date_selectors: &id003
  - (?:published|publication\s*date|last\s*updated)\s*:?\s*(\d{1,2}\s+[A-Za-z]{3,9}\s+\d{4})
  - (?:published|publication\s*date|last\s*updated)\s*:?\s*(\d{4}-\d{2}-\d{2})
